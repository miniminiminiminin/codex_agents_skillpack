[features]
multi_agent = true

[agents]
max_threads = 8
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only codebase and governance explorer for gathering evidence before edits or dispatch."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Implementation-focused agent for narrow owned-file changes after the path is understood."
config_file = "agents/worker.toml"

[agents.monitor]
description = "Read-only monitoring agent for waiting, polling, and reporting long-running status changes."
config_file = "agents/monitor.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, security, approval gaps, and missing verification."
config_file = "agents/reviewer.toml"

[agents.graph_editor]
description = "Shared-.codex graph editor that runs impact tracing before and after dependency-sensitive changes."
config_file = "agents/graph-editor.toml"
